<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>GitHub Issues Tracker</title>

  

  <!-- tailwind and daisyui cdn link -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- google font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
<style>
  *{
      font-family: "Geist", sans-serif;
  }
</style>
  
</head>

<body>
 
<section class="login-form  bg-slate-50 py-16">
  
  <!-- form container-->
  <form class="form-container flex items-center justify-center flex-col gap-4 bg-white shadow-sm max-w-md mx-auto py-8 px-6">
   
    <!-- form content -->
  <div  class="flex items-center justify-center flex-col gap-4 text-center">
   <img class="max-w-[60px]" src="./assets/image/github-logo.png" alt="">
    <div>
      <h2 class="font-semibold">GitHub Issues Tracker</h2>
       <p>Sign in to manage your issues</p>
    </div>
  </div>

    <!-- input field -->
  <fieldset class="fieldset border-base-300 rounded-box w-full ">
  
  <label class="label font-semibold">Username</label>
  <input id="userName" type="text" class="input w-full" placeholder="Enter Username" />

  <label class="label font-semibold">Password</label>
  <input id="pass" type="password" class="input w-full" placeholder="Enter Password" />

  <button type="button" id="btn-login" class="btn btn-primary mt-4">Login</button>
</fieldset>
    <div class="divider">OR</div>
     <!-- Credentials field -->
    <p>Demo Credentials:</p>
    <div class="text-sm bg-[#F8FAFC] text-center py-6 w-full">
      <p>Username: admin</p>
      <p>Password: admin123</p>
  </div>

  </form>
</section>
<script src="./login.js"></script>
</body>

</html>
